name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint SCSS
        run: npm run lint

      - name: Build CSS
        run: npm run build

      - name: Build docs
        run: npm run docs:build

      - name: Check package contents
        run: npm pack --dry-run

      - name: Check tracked files
        run: git diff --exit-code
