name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint SCSS
        run: npm run lint

      - name: Build CSS
        run: npm run build

      - name: Check CSS size budget
        run: npm run check:size

      - name: Check dist invariants
        run: npm run check:dist

      - name: Build docs
        run: npm run docs:build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check docs accessibility (axe, WCAG A/AA)
        run: npm run check:a11y

      # Visual baselines are Git LFS objects and platform-specific (font
      # rendering differs between macOS and Linux); checkout leaves LFS
      # pointers, so fetch just the Linux set, cached by content so
      # steady-state runs use no LFS bandwidth. The update-visual-baselines
      # workflow generates and commits the Linux set automatically when
      # it is missing.
      - name: List Linux visual baseline objects
        run: >
          git lfs ls-files -l -I 'tests/__screenshots__/*-linux/**'
          | awk '{print $1}' | sort > .lfs-baseline-oids

      - name: Cache LFS baseline objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-visual-${{ hashFiles('.lfs-baseline-oids') }}

      - name: Pull Linux visual baselines
        run: |
          git lfs install --local
          git lfs pull -I 'tests/__screenshots__/*-linux/**'

      - name: Visual regression (Playwright screenshot diff)
        run: |
          if ls tests/__screenshots__ 2>/dev/null | grep -q -- '-linux$'; then
            npm run check:visual
          else
            echo "::notice::No Linux visual baselines committed yet — the update-visual-baselines workflow will generate and commit them."
          fi

      - name: Check package contents
        run: npm pack --dry-run

      - name: Check tracked files
        run: git diff --exit-code
