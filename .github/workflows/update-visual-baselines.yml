# Generates and commits the Linux visual-regression baselines that CI
# compares against (screenshot baselines are platform-specific and live
# in Git LFS — see playwright.config.js). Runs unconditionally on every
# push that touches something able to change rendered output, and
# commits only if the regenerated screenshots actually differ — so it
# self-heals both a first-time bootstrap (no Linux baselines yet) and
# partial staleness (e.g. only one page's content changed), with no
# manual "delete the Linux baselines" step required on the contributor's
# side. workflow_dispatch runs it unconditionally, path filters aside
# (available once this file is on the default branch).
#
# The commit is pushed back to the same branch as github-actions[bot].
# Pushes made with the workflow token do not retrigger workflows, so
# this cannot loop. Because this runs as a second, async workflow
# alongside CI, a content change and its matching Linux baseline update
# land as two separate commits — CI's check:visual step on the
# content-change push itself may still fail against the now-stale
# baseline; the follow-up bot commit resolves it.
name: Update visual baselines

on:
  push:
    branches:
      - "**"
    paths:
      - "src/**"
      - "docs/**"
      - "scripts/build*.js"
      - "scripts/lib/**"
      - "tests/visual.spec.js"
      - "playwright.config.js"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: visual-baselines-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Regenerate Linux baselines
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build CSS
        run: npm run build

      - name: Build docs
        run: npm run docs:build

      - name: Regenerate baselines
        run: npx playwright test --update-snapshots

      - name: Commit and push baselines
        run: |
          git lfs install --local
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/__screenshots__
          if git diff --cached --quiet; then
            echo "Baselines unchanged — nothing to commit."
          else
            git commit -m "test: regenerate Linux visual baselines"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
