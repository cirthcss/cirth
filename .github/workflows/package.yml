name: Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Pack npm package
        run: npm pack

      - name: Pack dist archive
        run: tar -czf "cirth-dist-${GITHUB_REF_NAME:-manual}.tar.gz" dist

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          notes=".github/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$notes" ]; then
            cp "$notes" release-notes.md
          else
            printf "# %s\n\nSee the generated changelog for included changes.\n" "$GITHUB_REF_NAME" > release-notes.md
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cirth-dist
          path: cirth-dist-*.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: cirth-npm-package
          path: "*.tgz"
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            cirth-dist-*.tar.gz
            *.tgz
          generate_release_notes: true
