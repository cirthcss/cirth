name: Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build package artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Pack npm package
        run: npm pack

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cirth-dist
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: cirth-npm-package
          path: "*.tgz"
          if-no-files-found: error
          retention-days: 30
