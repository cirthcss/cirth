name: Publish npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish with
        required: true
        default: latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18"
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --tag "${NPM_DIST_TAG}"
        env:
          NPM_DIST_TAG: ${{ github.event.inputs.tag || 'latest' }}
