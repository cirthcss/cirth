name: Publish npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish with
        required: true
        default: next

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --tag "${{ inputs.tag }}" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
